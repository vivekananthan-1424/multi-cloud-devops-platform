<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Users')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar d-flex align-items-center justify-content-between">
        <div>
            <h5 class="mb-0 fw-bold text-dark">User Management</h5>
            <small class="text-muted">Manage system users and their roles</small>
        </div>
        <a th:href="@{/users/create}" class="btn btn-primary btn-sm"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-person-plus-fill me-1"></i> Add User
        </a>
    </div>

    <div class="container-fluid p-4">

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Search Bar -->
        <div class="card border-0 shadow-sm mb-3">
            <div class="card-body py-2">
                <form th:action="@{/users}" method="get" class="d-flex gap-2">
                    <input type="text" name="search" class="form-control form-control-sm"
                           placeholder="Search by name, username or email..."
                           th:value="${search}" style="max-width:400px;"/>
                    <button type="submit" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-search"></i> Search
                    </button>
                    <a th:href="@{/users}" class="btn btn-sm btn-outline-secondary"
                       th:if="${search != null}">
                        <i class="bi bi-x-circle"></i> Clear
                    </a>
                </form>
            </div>
        </div>

        <!-- Users Table -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Full Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                    No users found.
                                </td>
                            </tr>
                            <tr th:each="user, stat : ${users}">
                                <td class="text-muted small" th:text="${stat.count}"></td>
                                <td class="fw-semibold" th:text="${user.fullName}"></td>
                                <td class="text-muted" th:text="'@' + ${user.username}"></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                    <span th:text="${user.role.name().replace('ROLE_','')}"
                                          th:classappend="${user.role.name() == 'ROLE_ADMIN'}    ? 'badge badge-role-admin text-white' :
                                                          (${user.role.name() == 'ROLE_MANAGER'} ? 'badge badge-role-manager text-white' :
                                                           'badge badge-role-user text-white')">
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge bg-success">
                                        <i class="bi bi-circle-fill me-1" style="font-size:.5rem;"></i>Active
                                    </span>
                                    <span th:unless="${user.enabled}" class="badge bg-secondary">
                                        <i class="bi bi-circle-fill me-1" style="font-size:.5rem;"></i>Inactive
                                    </span>
                                </td>
                                <td class="small text-muted"
                                    th:text="${#temporals.format(user.createdAt,'MMM dd, yyyy')}"></td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <!-- Edit Button (Admin & Manager) -->
                                        <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
                                           th:href="@{/users/edit/{id}(id=${user.id})}"
                                           class="btn btn-outline-primary btn-sm" title="Edit">
                                            <i class="bi bi-pencil-fill"></i>
                                        </a>

                                        <!-- Toggle Status (Admin & Manager) -->
                                        <form sec:authorize="hasAnyRole('ADMIN','MANAGER')"
                                              th:action="@{/users/toggle/{id}(id=${user.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit"
                                                    th:class="${user.enabled} ? 'btn btn-outline-warning btn-sm' : 'btn btn-outline-success btn-sm'"
                                                    th:title="${user.enabled} ? 'Deactivate' : 'Activate'">
                                                <i th:class="${user.enabled} ? 'bi bi-toggle-on' : 'bi bi-toggle-off'"></i>
                                            </button>
                                        </form>

                                        <!-- Delete Button (Admin only) -->
                                        <form sec:authorize="hasRole('ADMIN')"
                                              th:action="@{/users/delete/{id}(id=${user.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Delete this user?')">
                                            <button type="submit" class="btn btn-outline-danger btn-sm" title="Delete">
                                                <i class="bi bi-trash-fill"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-white text-muted small">
                Showing <span th:text="${#lists.size(users)}">0</span> user(s)
                <span th:if="${search != null}"> matching "<span th:text="${search}"></span>"</span>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
