<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar}"></div>

<div class="main-content">
    <div class="topbar">
        <h5 class="mb-0 fw-bold text-dark">Error</h5>
    </div>

    <div class="container-fluid p-4">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 text-center">
                <div class="card border-0 shadow-sm p-5">
                    <div class="mb-3">
                        <i th:if="${errorCode == '403'}" class="bi bi-shield-x text-danger"
                           style="font-size: 4rem;"></i>
                        <i th:unless="${errorCode == '403'}" class="bi bi-exclamation-triangle text-warning"
                           style="font-size: 4rem;"></i>
                    </div>
                    <h1 class="fw-bold text-muted" th:text="${errorCode} ?: '500'"></h1>
                    <p class="text-muted fs-5 mb-4"
                       th:text="${errorMessage} ?: 'Something went wrong.'"></p>
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/dashboard}" class="btn btn-primary">
                            <i class="bi bi-house-fill me-1"></i> Go to Dashboard
                        </a>
                        <a onclick="history.back()" class="btn btn-outline-secondary" href="#">
                            <i class="bi bi-arrow-left me-1"></i> Go Back
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
