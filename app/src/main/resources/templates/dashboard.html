<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Main Content -->
<div class="main-content">
    <!-- Top Bar -->
    <div class="topbar d-flex align-items-center justify-content-between">
        <div>
            <h5 class="mb-0 fw-bold text-dark">Dashboard Overview</h5>
            <small class="text-muted">Welcome back, <span th:text="${currentUser}">admin</span>!</small>
        </div>
        <div class="text-muted small">
            <i class="bi bi-calendar3 me-1"></i>
            <span id="currentDate"></span>
        </div>
    </div>

    <div class="container-fluid p-4">

        <!-- Alerts -->
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- ── Stat Cards ── -->
        <div class="row g-3 mb-4">

            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-box bg-primary bg-opacity-10 text-primary">
                            <i class="bi bi-people-fill"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Total Users</div>
                            <div class="fs-3 fw-bold" th:text="${stats.totalUsers}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-box bg-success bg-opacity-10 text-success">
                            <i class="bi bi-person-check-fill"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Active Users</div>
                            <div class="fs-3 fw-bold text-success" th:text="${stats.activeUsers}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-box bg-danger bg-opacity-10 text-danger">
                            <i class="bi bi-person-x-fill"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Inactive Users</div>
                            <div class="fs-3 fw-bold text-danger" th:text="${stats.inactiveUsers}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-box bg-warning bg-opacity-10 text-warning">
                            <i class="bi bi-shield-fill"></i>
                        </div>
                        <div>
                            <div class="text-muted small">Admins</div>
                            <div class="fs-3 fw-bold text-warning" th:text="${stats.adminCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Charts Row ── -->
        <div class="row g-3 mb-4">
            <!-- Role Distribution Donut -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-white border-0 fw-semibold">
                        <i class="bi bi-pie-chart-fill text-primary me-1"></i> Role Distribution
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center">
                        <canvas id="roleChart" style="max-height:220px;"></canvas>
                    </div>
                </div>
            </div>

            <!-- Status Bar Chart -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-white border-0 fw-semibold">
                        <i class="bi bi-bar-chart-fill text-success me-1"></i> User Status
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center">
                        <canvas id="statusChart" style="max-height:220px;"></canvas>
                    </div>
                </div>
            </div>

            <!-- Access Level Horizontal Bar -->
            <div class="col-md-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-white border-0 fw-semibold">
                        <i class="bi bi-diagram-3-fill text-warning me-1"></i> Access Levels
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center">
                        <canvas id="accessChart" style="max-height:220px;"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Recent Users Table ── -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">
                <span class="fw-semibold">
                    <i class="bi bi-clock-history text-info me-1"></i> Recent Users
                </span>
                <a th:href="@{/users}" class="btn btn-sm btn-outline-primary">
                    View All <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${recentUsers}">
                                <td th:text="${user.fullName}"></td>
                                <td class="text-muted" th:text="'@' + ${user.username}"></td>
                                <td th:text="${user.email}"></td>
                                <td>
                                    <span th:text="${user.role.name().replace('ROLE_','')}"
                                          th:classappend="${user.role.name() == 'ROLE_ADMIN'} ? 'badge badge-role-admin text-white' :
                                                          (${user.role.name() == 'ROLE_MANAGER'} ? 'badge badge-role-manager text-white' :
                                                           'badge badge-role-user text-white')">
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                                    <span th:unless="${user.enabled}" class="badge bg-secondary">Inactive</span>
                                </td>
                                <td class="text-muted small"
                                    th:text="${#temporals.format(user.createdAt,'MMM dd, yyyy')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div><!-- /container -->
</div><!-- /main-content -->

<!-- Scripts -->
<div th:replace="~{fragments/layout :: scripts}"></div>

<script th:inline="javascript">
    // Inject server-side data safely
    const adminCount   = /*[[${stats.adminCount}]]*/   0;
    const managerCount = /*[[${stats.managerCount}]]*/ 0;
    const userCount    = /*[[${stats.userCount}]]*/    0;
    const activeUsers  = /*[[${stats.activeUsers}]]*/  0;
    const inactiveUsers = /*[[${stats.inactiveUsers}]]*/ 0;

    // Current date
    document.getElementById('currentDate').textContent =
        new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    // Role Donut Chart
    new Chart(document.getElementById('roleChart'), {
        type: 'doughnut',
        data: {
            labels: ['Admin', 'Manager', 'User'],
            datasets: [{ data: [adminCount, managerCount, userCount],
                backgroundColor: ['#dc2626','#d97706','#2563eb'], borderWidth: 2 }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    // Status Bar Chart
    new Chart(document.getElementById('statusChart'), {
        type: 'bar',
        data: {
            labels: ['Active', 'Inactive'],
            datasets: [{ label: 'Users', data: [activeUsers, inactiveUsers],
                backgroundColor: ['#22c55e','#ef4444'], borderRadius: 6 }]
        },
        options: { responsive: true, plugins: { legend: { display: false } },
                   scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });

    // Access Level Horizontal Bar
    new Chart(document.getElementById('accessChart'), {
        type: 'bar',
        data: {
            labels: ['Admin', 'Manager', 'User'],
            datasets: [{ data: [adminCount, managerCount, userCount],
                backgroundColor: ['#dc2626','#d97706','#2563eb'], borderRadius: 6 }]
        },
        options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
                   scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
</script>
</body>
</html>
