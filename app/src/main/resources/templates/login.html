<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="card shadow-lg border-0" style="width:400px; border-radius:1rem; overflow:hidden;">
    <!-- Card Header -->
    <div class="card-header text-center py-4"
         style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
        <div class="mb-2">
            <i class="bi bi-shield-lock-fill text-info" style="font-size:2.5rem;"></i>
        </div>
        <h4 class="text-white mb-0 fw-bold">Admin Dashboard</h4>
        <p class="text-secondary small mb-0">Sign in to your account</p>
    </div>

    <!-- Card Body -->
    <div class="card-body p-4">

        <!-- Error Alert -->
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            Invalid username or password.
        </div>

        <!-- Logout Alert -->
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle-fill me-1"></i>
            You have been logged out successfully.
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold small">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light">
                        <i class="bi bi-person-fill text-muted"></i>
                    </span>
                    <input type="text" id="username" name="username"
                           class="form-control" placeholder="Enter username"
                           required autofocus/>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold small">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light">
                        <i class="bi bi-lock-fill text-muted"></i>
                    </span>
                    <input type="password" id="password" name="password"
                           class="form-control" placeholder="Enter password"
                           required/>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
    </div>

    <!-- Default Credentials Hint (remove in production!) -->
    <div class="card-footer bg-light py-3">
        <p class="text-center text-muted small mb-1 fw-semibold">Demo Credentials</p>
        <div class="row text-center small text-muted">
            <div class="col-4">
                <div class="fw-semibold text-danger">Admin</div>
                <div>admin / admin123</div>
            </div>
            <div class="col-4">
                <div class="fw-semibold text-warning">Manager</div>
                <div>manager1 / manager123</div>
            </div>
            <div class="col-4">
                <div class="fw-semibold text-primary">User</div>
                <div>user1 / user123</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
