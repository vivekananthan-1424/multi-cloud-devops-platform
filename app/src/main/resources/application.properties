# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=admin-dashboard
server.port=8080

# ─── Database (H2 in-memory - Development) ───────────────────────────────────
spring.datasource.url=jdbc:h2:mem:admindb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─── Thymeleaf ────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Actuator (DevOps - Kubernetes probes, monitoring) ────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=Admin Dashboard
management.info.app.version=1.0.0

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.admin=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

