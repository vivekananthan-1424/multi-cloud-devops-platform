version: '3.9'

services:

  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-dashboard-app
    ports:
      - "8080:8080"
    environment:
      # Override H2 with PostgreSQL for production-like local dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/admindb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_H2_CONSOLE_ENABLED: "false"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - admin-net
    restart: unless-stopped

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: admin-dashboard-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: admindb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admindb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - admin-net
    restart: unless-stopped

  # ── pgAdmin (optional - DB GUI) ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: admin-dashboard-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - db
    networks:
      - admin-net
    profiles:
      - tools          # Only starts with: docker compose --profile tools up

volumes:
  postgres_data:

networks:
  admin-net:
    driver: bridge
